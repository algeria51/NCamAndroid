name: Build NCam Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # pages.h / pages.c are generated by a host tool (pages_gen) that reads
      # all webif HTML/JS/CSS templates and converts them to C structs.
      # This must run on the host (Linux) before the Android NDK cross-compiles.
      - name: Generate webif pages
        working-directory: app/src/main/cpp/ncam/webif
        run: |
          gcc -O2 -W -Wall -Wextra -Wno-sign-compare \
              ../minilzo/minilzo.c pages_gen.c -o pages_gen
          chmod +x pages_mkdep
          ./pages_mkdep
          ./pages_gen

      # Decode the keystore from GitHub Secret (base64) → file on disk
      # To set up: Go to repo → Settings → Secrets → Actions → New secret
      #   KEYSTORE_BASE64  = base64 content of ncam-release.keystore
      #   KEYSTORE_PASS    = ncam1234
      #   KEY_ALIAS        = ncam
      #   KEY_PASS         = ncam1234
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ncam-release.keystore
        # If secret is missing (e.g. a fork PR), skip gracefully — only debug APK will be signed
        continue-on-error: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
          # Pass signing credentials to Gradle via env vars (optional override)
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ncam-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ncam-release
          path: app/build/outputs/apk/release/*.apk
